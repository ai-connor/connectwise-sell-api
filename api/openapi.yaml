  securitySchemes:
    basic:
      description: "< p > Authentication is similar to Manage, using Basic Authorization.\
        \ Each request needs to pass an Authorization header that is a Base64 encoded\
        \ username:password, where username is a combination of AccessKey+SellAPIUsername\
        \ and password is password. (Full Authorization header would be \"accesskey+username:password\"\
        ). Your accesskey can be found by logging into Sell and checking the parameters\
        \ listed in the URL.</p> <p><blockquote>The user must be an API user.</blockquote></p>\
        \ <p><b>C# Sample</b></p> <p><code> string auth = Convert.ToBase64String(System.Text.Encoding.UTF8.GetBytes(accessKey\
        \ + \"+\" + SellAPIUsername + \":\" + sellPassword)); </p><p>client.Headers.Add(\"\
        Authorization:basic \" + auth);</code></p>"
      scheme: basic
      type: http
